<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>{{ title }}</title>

    <style>

        body {

            font-family: Arial, Helvetica, sans-serif;

            background: #f4f6f9;

            margin: 40px;

            color: #333333;

        }

        .container {

            max-width: 1100px;

            margin: auto;

            background: #ffffff;

            border-radius: 10px;

            box-shadow: 0 2px 10px rgba(0,0,0,.15);

            padding: 40px;

        }

        h1 {

            color: #0d47a1;

            border-bottom: 3px solid #1976d2;

            padding-bottom: 10px;

        }

        h2 {

            color: #1565c0;

            margin-top: 35px;

            border-left: 6px solid #1976d2;

            padding-left: 10px;

        }

        table {

            width: 100%;

            border-collapse: collapse;

            margin-top: 20px;

            margin-bottom: 20px;

        }

        th {

            background: #1976d2;

            color: white;

            padding: 12px;

            text-align: left;

        }

        td {

            border: 1px solid #dddddd;

            padding: 10px;

        }

        tr:nth-child(even) {

            background: #f8f8f8;

        }

        ul {

            margin-top: 10px;

        }

        li {

            margin-bottom: 8px;

        }

        hr {

            border: none;

            border-top: 1px solid #dddddd;

            margin: 35px 0;

        }

        .footer {

            margin-top: 50px;

            text-align: center;

            font-size: 13px;

            color: #777777;

        }

    </style>

</head>

<body>

<div class="container">

{{ body }}

</div>

<div class="footer">

Generated by AI BI Copilot

</div>

</body>

</html>
